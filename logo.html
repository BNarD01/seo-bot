<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SEO Bot Logo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }
        .logo-container {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .robot-icon {
            font-size: 120px;
            margin-bottom: 20px;
        }
        .logo-text {
            color: white;
            font-family: 'Arial', sans-serif;
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .logo-subtitle {
            color: rgba(255,255,255,0.9);
            font-family: 'Arial', sans-serif;
            font-size: 20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="robot-icon">🤖</div>
        <div class="logo-text">SEO BOT</div>
        <div class="logo-subtitle">AI Article Generator</div>
    </div>
</body>
</html>
